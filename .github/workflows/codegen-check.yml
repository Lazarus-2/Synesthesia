name: codegen-check

# Fail the PR if the checked-in OpenAPI types are out of sync with the
# FastAPI app. Runs codegen and diffs against the repo state — keeps the
# frontend's source-of-truth types from drifting silently.

on:
  pull_request:
    branches: [main]
    paths:
      - "backend/**"
      - "frontend/web/src/types/openapi.json"
      - "frontend/web/src/types/api.gen.ts"
      - "frontend/web/package.json"

jobs:
  diff:
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:6.0
        ports: ["27017:27017"]
      redis:
        image: redis:7
        ports: ["6379:6379"]

    env:
      MONGO_URI: mongodb://localhost:27017/synesthesia_codegen
      REDIS_URL: redis://localhost:6379/0
      LLM_PROVIDER: ollama

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/web/package-lock.json

      - name: System deps
        run: sudo apt-get update && sudo apt-get install -y ffmpeg libsndfile1

      - name: Python deps
        run: |
          pip install -r backend/requirements.txt
          pip install -e ./backend

      - name: Frontend deps
        working-directory: frontend/web
        run: npm ci

      - name: Regenerate types
        working-directory: frontend/web
        run: npm run codegen

      - name: Diff against checked-in artifacts
        run: |
          if ! git diff --exit-code -- frontend/web/src/types/openapi.json frontend/web/src/types/api.gen.ts; then
            echo "::error::OpenAPI types are stale. Run 'npm run codegen' from frontend/web and commit the result."
            exit 1
          fi
