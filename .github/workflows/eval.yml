name: eval

# Eval-only workflow: runs the golden-songs evaluation harness. Manual /
# scheduled so it doesn't block PRs (LLM costs + flakiness), but available
# for nightly accuracy regression detection once an audio fixture set lands
# (Plan 3 D6).

on:
  workflow_dispatch:
  schedule:
    # Weekly, Sundays at 06:00 UTC. Adjust as needed.
    - cron: "0 6 * * 0"

jobs:
  golden-songs:
    runs-on: ubuntu-latest
    env:
      MONGO_URI: mongodb://localhost:27017/synesthesia_eval
      REDIS_URL: redis://localhost:6379/0
      LLM_PROVIDER: ${{ vars.EVAL_LLM_PROVIDER || 'ollama' }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    services:
      mongodb:
        image: mongo:6.0
        ports: ["27017:27017"]
      redis:
        image: redis:7
        ports: ["6379:6379"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: System deps
        run: sudo apt-get update && sudo apt-get install -y ffmpeg libsndfile1

      - name: Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install -e ./backend

      - name: Run eval harness
        run: python -m backend.tests.eval_runner
        # Plan 3 D6 follow-up: parse the score, compare against a stored
        # baseline, fail if accuracy drops > 5%, and post a comment on the
        # triggering PR with the delta.
