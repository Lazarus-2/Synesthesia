name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  pytest:
    runs-on: ubuntu-latest

    # Live Mongo (replica set) + Redis so integration paths (Mongo lifespan,
    # Taskiq broker, slowapi storage) execute against real services rather
    # than mocks. The eval / heavy-ML tests still skip without audio fixtures.
    services:
      mongodb:
        image: mongo:6.0
        ports: ["27017:27017"]
        options: >-
          --health-cmd "echo 'db.runCommand({ping:1}).ok' | mongosh --quiet"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      MONGO_URI: mongodb://localhost:27017/synesthesia_ci
      REDIS_URL: redis://localhost:6379/0
      LLM_PROVIDER: ollama  # avoids needing real API keys to start
      LOG_FORMAT: plain

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: System deps
        run: sudo apt-get update && sudo apt-get install -y ffmpeg libsndfile1

      - name: Python deps
        run: |
          python -m pip install --upgrade pip
          # Skip the heavy demucs / basic-pitch installs — they're optional
          # extras and the unit tests don't exercise them.
          pip install -r backend/requirements.txt
          # Editable install + dev extra so pytest-asyncio / sse-starlette and
          # the rest of the test tooling are present for the full suite.
          pip install -e "./backend[dev]"

      - name: Pytest
        run: >-
          pytest -c backend/pyproject.toml
          backend/tests/test_tools.py
          backend/tests/test_db_cache.py
          backend/tests/test_graph_routing.py
          backend/tests/test_chains.py
          backend/tests/test_api.py
          backend/tests/test_ml.py
          backend/tests/test_search_and_lyrics.py
          backend/tests/test_acoustid_enrich.py
          backend/tests/test_spotify_ingestion.py
          backend/tests/test_sse_progress.py
          -m "not ml and not integration"
          -v --tb=short
