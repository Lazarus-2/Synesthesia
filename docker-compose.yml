version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped
    command: ["--replSet", "rs0", "--bind_ip_all", "--port", "27017"]

  mongodb-setup:
    image: mongo:6.0
    depends_on:
      - mongodb
    restart: "no"
    command: >
      bash -c "
        sleep 5;
        mongosh --host mongodb:27017 --eval 'rs.initiate({_id: \"rs0\", members: [{_id: 0, host: \"mongodb:27017\"}]})' || true
      "

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning

  api:
    build:
      context: .
      target: runtime-api
    ports:
      - "8001:8001"
    # --timeout-graceful-shutdown lets uvicorn finish in-flight requests
    # (including SSE streams) before exiting. Pairs with stop_grace_period
    # below so docker stop / orchestrator drain sequences don't sever
    # connections mid-response.
    command:
      - "uvicorn"
      - "backend.main:app"
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "8001"
      - "--timeout-graceful-shutdown"
      - "120"
    environment:
      - MONGO_URI=mongodb://mongodb:27017/synesthesia?replicaSet=rs0
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - mongodb
      - redis
    env_file:
      - .env
    volumes:
      - ./storage:/app/storage
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request, sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8001/health').status == 200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    stop_grace_period: 130s

  worker:
    build:
      context: .
      target: runtime-worker
    # CMD in the runtime-worker stage already runs taskiq; no override needed.
    environment:
      - MONGO_URI=mongodb://mongodb:27017/synesthesia?replicaSet=rs0
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - mongodb
      - redis
    env_file:
      - .env
    volumes:
      - ./storage:/app/storage
    # An analysis run can take 60–120s; give Taskiq room to finish in-flight
    # jobs before docker SIGKILLs the container.
    stop_grace_period: 130s

volumes:
  mongodb_data:
  redis_data:
