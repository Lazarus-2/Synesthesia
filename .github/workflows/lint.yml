name: lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ruff-and-mypy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install lint tools
        # pyproject.toml lives at backend/pyproject.toml after the layout
        # refactor; install from there so ``backend`` is importable via the
        # editable install. ``[dev]`` extra pulls ruff + mypy + pytest.
        run: |
          python -m pip install --upgrade pip
          pip install -e "./backend[dev]"
          # Just enough non-dev runtime deps for mypy to resolve in-scope imports.
          pip install motor>=3.6 pyyaml>=6.0 langchain-core>=0.3 pydantic>=2.9 pydantic-settings>=2.6

      - name: Ruff (style + bugs)
        run: ruff check backend/

      - name: Mypy (strict-first scope)
        run: mypy --config-file backend/pyproject.toml
